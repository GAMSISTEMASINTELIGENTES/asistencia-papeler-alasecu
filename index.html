<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seguridad La Secu - Control de Asistencia</title>
    <style>
        :root { 
            --primary: #1d3557; 
            --success: #25D366; 
            --error: #e63946; 
            --warning: #f1c40f;
            --bg: #f0f2f5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .app-container {
            background: white; width: 100%; max-width: 400px; height: 100vh; display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow-y: auto;
        }

        .header { 
            background: var(--primary); color: white; padding: 40px 20px 25px; 
            text-align: center; border-radius: 0 0 25px 25px; 
        }
        .header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 1px; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 0.8rem; }

        .content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }

        /* ESTADO DEL GPS (EL PORTERO) */
        #geo-lock {
            padding: 20px; border-radius: 15px; text-align: center; font-weight: bold;
            background: #fff3cd; color: #856404; border: 2px dashed #ffeeba;
            transition: 0.3s;
        }
        #geo-lock.valid { 
            background: #d4edda; color: #155724; border: 2px solid #c3e6cb; 
        }

        /* CONTENEDOR DE FORMULARIO BLOQUEADO */
        #main-form { 
            display: none; flex-direction: column; gap: 15px; opacity: 0; transform: translateY(10px);
            transition: 0.4s ease;
        }
        #main-form.unlocked { display: flex; opacity: 1; transform: translateY(0); }

        label { font-weight: bold; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; margin-bottom: -5px; }
        
        select, textarea { 
            padding: 16px; border-radius: 12px; border: 2px solid #ddd; font-size: 1rem; 
            width: 100%; background: #fff;
        }

        .btn { 
            padding: 20px; border-radius: 15px; border: none; font-size: 1.1rem; 
            font-weight: bold; color: white; cursor: pointer; transition: 0.2s;
        }
        .btn-success { background: var(--success); box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); }
        .btn-error { background: var(--error); box-shadow: 0 4px 12px rgba(230, 57, 70, 0.2); }
        .btn:active { transform: scale(0.98); }

        /* AREA DE OBSERVACIONES */
        #obs-area { 
            display: none; flex-direction: column; gap: 10px; 
            padding-top: 15px; border-top: 1px solid #eee; margin-top: 10px;
        }

        /* HISTORIAL */
        .history-section { padding: 0 25px 30px; }
        .history-title { font-size: 0.7rem; color: #999; text-transform: uppercase; margin-bottom: 10px; }
        .log-item { 
            font-size: 0.8rem; padding: 12px; border-radius: 10px; background: #f8f9fa; 
            margin-bottom: 8px; border-left: 4px solid var(--primary); 
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Papelería La Secu</h1>
        <p>Sistema de Seguridad de Asistencia</p>
    </div>

    <div class="content">
        <div id="geo-lock">
            🛰️ BUSCANDO UBICACIÓN...<br>
            <span style="font-size: 0.7rem; font-weight: normal;">Acércate a la sucursal para desbloquear.</span>
        </div>

        <div id="main-form">
            <div style="text-align:center; color: var(--success); font-weight: bold; font-size: 0.8rem;">
                🔓 ACCESO AUTORIZADO POR UBICACIÓN
            </div>
            
            <div class="input-group">
                <label>¿Quién realiza el registro?</label>
                <select id="employee">
                    <option value="">-- Selecciona tu nombre --</option>
                    <option value="Empleado 1">Empleado 1</option>
                    <option value="Empleado 2">Empleado 2</option>
                    <option value="Empleado 3">Empleado 3</option>
                    <option value="Empleado 4">Empleado 4</option>
                </select>
            </div>

            <div id="action-buttons" style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn btn-success" onclick="registrar('ENTRADA')">REGISTRAR ENTRADA</button>
                <button class="btn btn-error" onclick="abrirSalida()">REGISTRAR SALIDA</button>
            </div>

            <div id="obs-area">
                <label>Observaciones de Salida</label>
                <textarea id="txtObs" rows="3" placeholder="Ej: Mercancía recibida, todo en orden..."></textarea>
                <button class="btn btn-error" onclick="registrar('SALIDA')">CONFIRMAR SALIDA Y ENVIAR</button>
                <button style="background:none; border:none; color:gray; text-decoration:underline; font-size:0.8rem;" onclick="cancelarSalida()">Volver</button>
            </div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-title">Registros locales recientes</div>
        <div id="logBox"></div>
    </div>
</div>

<script>
    // CONFIGURACIÓN DE SEGURIDAD
    const CONFIG = {
        lat: 18.906744582104, 
        lon: -103.868403104, 
        rango: 85, // Metros de tolerancia
        tel: "523339019091"
    };

    function init() {
        if (!navigator.geolocation) {
            document.getElementById('geo-lock').innerHTML = "❌ GPS NO COMPATIBLE";
            return;
        }

        // Monitoreo constante del satélite
        navigator.geolocation.watchPosition(verificarSeguridad, errorGPS, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });

        renderLog();
    }

    function verificarSeguridad(pos) {
        const dist = calcularDistancia(pos.coords.latitude, pos.coords.longitude, CONFIG.lat, CONFIG.lon);
        const lockBox = document.getElementById('geo-lock');
        const form = document.getElementById('main-form');

        if (dist <= CONFIG.rango) {
            lockBox.innerHTML = `✅ UBICACIÓN VALIDADA<br><span style="font-size:0.7rem">Distancia a base: ${Math.round(dist)}m</span>`;
            lockBox.className = "valid";
            form.classList.add('unlocked');
        } else {
            lockBox.innerHTML = `📍 FUERA DE RANGO<br><span style="font-size:0.7rem">Estás a ${Math.round(dist)}m. Debes estar en sitio.</span>`;
            lockBox.className = "";
            form.classList.remove('unlocked');
            cancelarSalida(); // Resetear si se aleja
        }
    }

    function errorGPS(err) {
        document.getElementById('geo-lock').innerHTML = "⚠️ GPS SIN SEÑAL<br><span style="font-size:0.7rem">Verifica permisos de ubicación en Ajustes.</span>";
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function abrirSalida() {
        const emp = document.getElementById('employee').value;
        if(!emp) { alert("Por favor selecciona tu nombre."); return; }
        document.getElementById('action-buttons').style.display = "none";
        document.getElementById('obs-area').style.display = "flex";
    }

    function cancelarSalida() {
        document.getElementById('action-buttons').style.display = "flex";
        document.getElementById('obs-area').style.display = "none";
    }

    function registrar(tipo) {
        const emp = document.getElementById('employee').value;
        if(!emp) { alert("Selecciona tu nombre"); return; }

        const ahora = new Date();
        const hora = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const obs = document.getElementById('txtObs').value || "Sin observaciones";

        // Guardado local (PWA Offline Ready)
        let logs = JSON.parse(localStorage.getItem('logs_secu_v1.5')) || [];
        logs.unshift({ nombre: emp, tipo: tipo, hora: hora });
        localStorage.setItem('logs_secu_v1.5', JSON.stringify(logs.slice(0,5)));
        renderLog();

        // Preparar mensaje WhatsApp
        let msg = `🏢 *LA SECU - CONTROL*\n`;
        msg += `👤 *Empleado:* ${emp}\n`;
        msg += `🔘 *Movimiento:* ${tipo}\n`;
        msg += `🕒 *Hora:* ${hora}\n`;
        if(tipo === 'SALIDA') msg += `📝 *Obs:* ${obs}\n`;
        msg += `\n✅ *Registro validado por Geofence.*`;

        window.location.href = `https://wa.me/${CONFIG.tel}?text=${encodeURIComponent(msg)}`;
    }

    function renderLog() {
        const logs = JSON.parse(localStorage.getItem('logs_secu_v1.5')) || [];
        document.getElementById('logBox').innerHTML = logs.map(l => 
            `<div class="log-item"><span>${l.tipo}: ${l.nombre}</span> <b>${l.hora}</b></div>`
        ).join('');
    }

    window.onload = init;
</script>

</body>
</html>
