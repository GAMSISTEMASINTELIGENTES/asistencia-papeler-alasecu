<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secu Asistencia</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="La Secu">

    <style>
        :root { --primary: #1d3557; --success: #25D366; --error: #e63946; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* Esta interfaz siempre debe estar visible */
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; }
        .content { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        #offline-notice { background: #ff9500; color: white; width: 100%; text-align: center; font-size: 0.7rem; padding: 5px; display: none; border-radius: 5px; margin-bottom: 10px; }

        #geo-lock { padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; background: #eee; border: 2px solid #ddd; }
        .valid { background: #d4edda !important; color: #155724 !important; border-color: #c3e6cb !important; }
        
        #main-form { display: none; flex-direction: column; gap: 12px; }
        select, textarea { padding: 15px; border-radius: 10px; border: 2px solid #ddd; font-size: 1rem; width: 100%; }
        .btn { padding: 18px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; color: white; cursor: pointer; }
        .btn-gps { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-error { background: var(--error); }
        #obs-area { display: none; flex-direction: column; gap: 10px; margin-top: 10px; border-top: 2px solid #eee; padding-top: 15px; }
        
        .history-container { width: 100%; max-width: 400px; margin-top: 20px; }
        .log-card { background: white; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="offline-notice">TRABAJANDO SIN CONEXIÓN</div>

<div class="app-container">
    <div class="header">
        <h1 style="margin:0; font-size:1.2rem;">Papelería La Secu</h1>
        <p style="margin:5px 0 0; font-size:0.8rem; opacity:0.8;">Asistencia Local 2026</p>
    </div>

    <div class="content">
        <button id="btnStart" class="btn btn-gps" onclick="activarSensor()">ACTIVAR GPS / VALIDAR</button>
        <div id="geo-lock">SISTEMA LISTO</div>

        <div id="main-form">
            <select id="employee">
                <option value="">-- Selecciona tu nombre --</option>
                <option value="Empleado 1">Empleado 1</option>
                <option value="Empleado 2">Empleado 2</option>
            </select>

            <div id="action-btns" style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn btn-success" onclick="registrar('ENTRADA')">REGISTRAR ENTRADA</button>
                <button class="btn btn-error" onclick="abrirObs()">REGISTRAR SALIDA</button>
            </div>

            <div id="obs-area">
                <textarea id="txtObs" rows="3" placeholder="Observaciones de salida..."></textarea>
                <button class="btn btn-error" onclick="registrar('SALIDA')">ENVIAR Y GUARDAR</button>
            </div>
        </div>
    </div>
</div>

<div class="history-container">
    <div id="history-list"></div>
</div>

<script>
    const CONFIG = { lat: 18.906744582104, lon: -103.868403104, rango: 130, tel: "523339019091" };

    // Registro del Service Worker para funcionamiento Offline
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => console.log("Offline Ready"));
    }

    // Detectar internet
    window.addEventListener('offline', () => document.getElementById('offline-notice').style.display = 'block');
    window.addEventListener('online', () => document.getElementById('offline-notice').style.display = 'none');

    function activarSensor() {
        document.getElementById('btnStart').style.display = "none";
        document.getElementById('geo-lock').innerHTML = "BUSCANDO SATÉLITES...";
        navigator.geolocation.watchPosition(verificar, () => alert("Error GPS. Activa ubicación."), { enableHighAccuracy: true });
    }

    function verificar(pos) {
        const d = calcDist(pos.coords.latitude, pos.coords.longitude, CONFIG.lat, CONFIG.lon);
        const lock = document.getElementById('geo-lock');
        const form = document.getElementById('main-form');
        if (d <= CONFIG.rango) {
            lock.innerHTML = `UBICACIÓN OK (${Math.round(d)}m)`;
            lock.className = "valid";
            form.style.display = "flex";
        } else {
            lock.innerHTML = `FUERA DE RANGO (${Math.round(d)}m)`;
            lock.className = "";
            form.style.display = "none";
        }
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function abrirObs() {
        if(!document.getElementById('employee').value) return alert("Elige tu nombre");
        document.getElementById('action-btns').style.display = "none";
        document.getElementById('obs-area').style.display = "flex";
    }

    function registrar(tipo) {
        const emp = document.getElementById('employee').value;
        const ahora = new Date();
        const hora = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const fecha = ahora.toLocaleDateString();
        const obs = document.getElementById('txtObs').value || "Sin notas";

        // Guardar localmente (esto funciona SIEMPRE, con o sin internet)
        let historial = JSON.parse(localStorage.getItem('secu_v3')) || [];
        historial.unshift({ emp, tipo, hora, fecha });
        localStorage.setItem('secu_v3', JSON.stringify(historial.slice(0,20)));
        renderHistory();

        let msg = `📍 *LA SECU*\n👤 ${emp}\n🔘 ${tipo}\n🕒 ${hora}\n📅 ${fecha}\n📝 Obs: ${obs}`;
        window.location.href = `https://wa.me/${CONFIG.tel}?text=${encodeURIComponent(msg)}`;
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('secu_v3')) || [];
        document.getElementById('history-list').innerHTML = h.map(r => `
            <div class="log-card">
                <div><b>${r.emp}</b><br><small>${r.fecha} ${r.hora}</small></div>
                <b style="color:${r.tipo=='ENTRADA'?'green':'red'}">${r.tipo}</b>
            </div>
        `).join('');
    }
    renderHistory();
</script>
</body>
</html>
