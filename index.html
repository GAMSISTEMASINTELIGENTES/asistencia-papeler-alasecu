<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditoría La Secu</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --primary: #1d3557; --success: #25D366; --error: #e63946; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; }
        .content { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        #geo-lock { padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; background: #f8f9fa; border: 2px dashed #ccc; color: #666; }
        .valid { background: #d4edda !important; color: #155724 !important; border: 2px solid #25D366 !important; }
        
        #main-form { display: none; flex-direction: column; gap: 12px; }
        select, textarea { padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem; width: 100%; outline: none; }

        .btn { padding: 18px; border-radius: 15px; border: none; font-size: 1rem; font-weight: bold; color: white; cursor: pointer; }
        .btn-gps { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-error { background: var(--error); }
        
        /* ESTILOS DEL HISTORIAL DE AUDITORÍA */
        .history-container { width: 100%; max-width: 400px; margin-top: 20px; }
        .log-card { background: white; padding: 12px; border-radius: 15px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); cursor: pointer; }
        .log-header { display: flex; justify-content: space-between; align-items: center; }
        .log-body { display: none; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 0.8rem; border: 1px solid #eee; white-space: pre-wrap; color: #444; }
        .type-tag { font-size: 0.7rem; font-weight: bold; padding: 4px 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 style="margin:0; font-size:1.2rem;">PAPELERÍA LA SECU</h1>
        <p style="margin:5px 0 0; font-size:0.8rem; opacity:0.8;">Auditoría de Asistencia</p>
    </div>

    <div class="content">
        <button id="btnStart" class="btn btn-gps" onclick="activarSensor()">🔓 VALIDAR UBICACIÓN</button>
        <div id="geo-lock">SISTEMA BLOQUEADO</div>

        <div id="main-form">
            <select id="employee">
                <option value="">-- Selecciona tu nombre --</option>
                <option value="Empleado 1">Empleado 1</option>
                <option value="Empleado 2">Empleado 2</option>
            </select>

            <div id="action-btns" style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn btn-success" onclick="registrar('ENTRADA')">REGISTRAR ENTRADA</button>
                <button class="btn btn-error" onclick="abrirSalida()">REGISTRAR SALIDA</button>
            </div>

            <div id="obs-area" style="display:none; flex-direction:column; gap:10px;">
                <textarea id="txtObs" rows="2" placeholder="Notas de salida..."></textarea>
                <button class="btn btn-error" onclick="registrar('SALIDA')">CONFIRMAR SALIDA</button>
            </div>
        </div>
    </div>
</div>

<div class="history-container">
    <p style="font-size: 0.8rem; color: #666; text-align: center;">Toca un registro para ver el reporte original</p>
    <div id="history-list"></div>
</div>

<script>
    const CONFIG = { lat: 18.906744582104, lon: -103.868403104, rango: 150, tel: "523339019091" };

    function activarSensor() {
        document.getElementById('geo-lock').innerHTML = "📡 BUSCANDO...";
        navigator.geolocation.watchPosition(verificar, () => {}, { enableHighAccuracy: true });
    }

    function verificar(pos) {
        const d = calcDist(pos.coords.latitude, pos.coords.longitude, CONFIG.lat, CONFIG.lon);
        const lock = document.getElementById('geo-lock');
        const form = document.getElementById('main-form');
        document.getElementById('btnStart').style.display = "none";
        if (d <= CONFIG.rango) {
            lock.innerHTML = `✅ EN SITIO (${Math.round(d)}m)`;
            lock.className = "valid";
            form.style.display = "flex";
        } else {
            lock.innerHTML = `📍 FUERA (${Math.round(d)}m)`;
            lock.className = "";
            form.style.display = "none";
        }
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function abrirSalida() {
        if(!document.getElementById('employee').value) return alert("Selecciona tu nombre");
        document.getElementById('action-btns').style.display = "none";
        document.getElementById('obs-area').style.display = "flex";
    }

    function registrar(tipo) {
        const emp = document.getElementById('employee').value;
        if(!emp) return alert("Selecciona tu nombre");

        const ahora = new Date();
        const hora = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const fecha = ahora.toLocaleDateString('es-MX', {day:'2-digit', month:'short'});
        const obs = document.getElementById('txtObs').value || "Sin notas";

        // EL TEXTO "MAESTRO" QUE NO SE PUEDE MODIFICAR EN LA APP
        const textoOriginal = `🏢 *LA SECU - ASISTENCIA*\n👤 ${emp}\n🔘 ${tipo}\n🕒 ${hora}\n📅 ${fecha}\n📝 Obs: ${obs}\n\n✅ _Validado GPS Offline_`;

        // GUARDAR EN EL HISTORIAL DE AUDITORÍA
        const reg = { emp, tipo, hora, fecha, textoOriginal, ts: ahora.getTime() };
        let logs = JSON.parse(localStorage.getItem('secu_vAudit')) || [];
        logs.unshift(reg);
        localStorage.setItem('secu_vAudit', JSON.stringify(logs.slice(0,30)));
        
        renderHistory();

        // COPIAR AL PORTAPAPELES
        navigator.clipboard.writeText(textoOriginal);

        // ENVIAR A WHATSAPP
        window.location.href = `https://wa.me/${CONFIG.tel}?text=${encodeURIComponent(textoOriginal)}`;
    }

    function renderHistory() {
        const logs = JSON.parse(localStorage.getItem('secu_vAudit')) || [];
        const lista = document.getElementById('history-list');
        lista.innerHTML = logs.map((l, i) => `
            <div class="log-card" onclick="toggleLog(${i})">
                <div class="log-header">
                    <div>
                        <b style="font-size:0.9rem;">${l.emp}</b><br>
                        <small style="color:#888;">${l.fecha} | ${l.hora}</small>
                    </div>
                    <span class="type-tag" style="background:${l.tipo=='ENTRADA'?'#d4edda':'#f8d7da'}; color:${l.tipo=='ENTRADA'?'#155724':'#721c24'}">${l.tipo}</span>
                </div>
                <div id="details-${i}" class="log-body">
                    <b>Reporte Original:</b><br>${l.textoOriginal}
                    <br><button onclick="event.stopPropagation(); reenviar(${i})" style="margin-top:10px; width:100%; padding:8px; border-radius:8px; border:1px solid #ddd; background:white; font-size:0.7rem;">Reenviar a WhatsApp</button>
                </div>
            </div>
        `).join('');
    }

    function toggleLog(i) {
        const el = document.getElementById(`details-${i}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function reenviar(i) {
        const logs = JSON.parse(localStorage.getItem('secu_vAudit')) || [];
        const texto = logs[i].textoOriginal;
        navigator.clipboard.writeText(texto);
        window.location.href = `https://wa.me/${CONFIG.tel}?text=${encodeURIComponent(texto)}`;
    }

    renderHistory();
</script>
</body>
</html>
